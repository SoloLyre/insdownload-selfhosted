name: Feature request
description: Suggest a scoped improvement for the self-hosted downloader.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: It is hard to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Add ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and tradeoffs
      description: Call out platform constraints, browser dependencies, or quality tradeoffs.
      placeholder: This should only apply to ...
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I also considered ...
    validations:
      required: false
